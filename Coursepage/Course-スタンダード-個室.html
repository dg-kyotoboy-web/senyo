<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BOY専用ページ</title>

  <link rel="stylesheet" href="../style.css">
</head>

<body>

<div id="header"></div>

<!-- =========================
     コース一覧
========================= -->

<main class="course-page">

  <h2 class="course-title">
    スタンダードコース
    <br>
  <span class="course-subtitle">
    【個室】
  </span>
  </h2>

  <div class="course-note-box">

    <p>
      ※割引類は、全て利用可能
    </p>

  </div>

  <!-- 60分 -->

  <section class="course-row">

    <div class="course-name">
      60分
    </div>

    <div class="price-box">
      <div class="price-label">
        個室
      </div>

      <div class="price">
        ￥15,000-
      </div>
    </div>

  </section>

  <!-- 90分 -->

  <section class="course-row">

    <div class="course-name">
      90分
    </div>

    <div class="price-box">
      <div class="price-label">
        個室
      </div>

      <div class="price">
        ￥20,000-
      </div>
    </div>

  </section>

  <!-- 120分 -->

  <section class="course-row">

    <div class="course-name">
      120分
    </div>

    <div class="price-box">
      <div class="price-label">
        個室
      </div>

      <div class="price">
        ￥23,000-
      </div>
    </div>

</main>

<script>
fetch("../parts/header.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  });
</script>
  
</body>
</html>
