<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BOY専用ページ</title>

  <link rel="stylesheet" href="../style.css">
</head>

<body>

<div id="header"></div>

<!-- =========================
     コース一覧
========================= -->

<main class="course-page">

  <h2 class="course-title">
  デートコース
　<br>
  <span class="course-subtitle">
    【出張のみ】
  </span>
</h2>

  <div class="course-note-box">

　　<p>
      ※PREMIUMシルバー会員限定コース
    <br>
      ※<span class="red">プレイなし</span>
    <br>
      ※<span class="red">割引類一切使用不可</span>
    </p>

  </div>

  <!-- デート -->

  <section class="course-row">

    <div class="course-name">
      デート60分
    </div>

    <div class="price-box">
      <div class="price-label">
        出張
      </div>

      <div class="price">
        ￥8,500-
      </div>
    </div>

</main>

<script>
fetch("../parts/header.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  });
</script>

<script>
fetch("../parts/header.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;

    const menuToggle = document.getElementById("menuToggle");
    const globalMenu = document.getElementById("globalMenu");

    menuToggle.addEventListener("click", function(){
      globalMenu.classList.toggle("active");

      if(menuToggle.textContent === "☰"){
        menuToggle.textContent = "×";
        menuToggle.style.color = "#333";
      }else{
        menuToggle.textContent = "☰";
        menuToggle.style.color = "white";
      }
    });

    document.querySelectorAll(".dropdown .dropbtn").forEach(function(button){
      button.addEventListener("click", function(){
        this.parentElement.classList.toggle("open");
      });
    });

    document.querySelectorAll(".submenu > a").forEach(function(link){
      link.addEventListener("click", function(e){
        e.preventDefault();
        this.parentElement.classList.toggle("open");
      });
    });
  });
</script>
  
</body>
</html>
