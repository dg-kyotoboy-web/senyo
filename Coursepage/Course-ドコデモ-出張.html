<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BOY専用ページ</title>

  <link rel="stylesheet" href="../style.css">
</head>

<body>

<div id="header"></div>

<!-- =========================
     コース一覧
========================= -->

<main class="course-page">

  <h2 class="course-title">
    ドコデモDG
  <br>
  <span class="course-subtitle">
    【事前決済のみ】
  </span>
  </h2>

  <!-- 120分 -->

  <section class="course-row">

    <div class="course-name">
      120分
    </div>

    <div class="price-box">

      <div class="price-label">
        出張
      </div>

      <div class="price">
        ￥23,000-
      </div>

    </div>

  </section>

  <!-- SHORT -->

  <section class="course-row">

    <div class="course-name">
      SHORT 8時間
    </div>

    <div class="price-box">

      <div class="price-label">
        出張
      </div>

      <div class="price">
        ￥29,000-
      </div>

    </div>

  </section>

  <!-- MIDDLE -->

  <section class="course-row">

    <div class="course-name">
      MIDDLE 10時間
    </div>

    <div class="price-box">

      <div class="price-label">
        出張
      </div>

      <div class="price">
        ￥31,000-
      </div>

    </div>

  </section>

  <!-- LONG -->

  <section class="course-row">

    <div class="course-name">
      LONG 12時間
    </div>

    <div class="price-box">

      <div class="price-label">
        出張
      </div>

      <div class="price">
        ￥33,000-
      </div>

    </div>

  </section>

  <!-- S貸切 -->

  <section class="course-row">

    <div class="course-name">
      19時間 貸切
    </div>

    <div class="price-box">

      <div class="price-label">
        出張
      </div>

      <div class="price">
        ￥64,000-
      </div>

    </div>

  </section>

  <!-- 貸切 -->

  <section class="course-row">

    <div class="course-name">
      24時間 貸切
    </div>

    <div class="price-box">

      <div class="price-label">
        出張
      </div>

      <div class="price">
        ￥75,000-
      </div>

    </div>

  </section>


  <!-- ドコデモDG注意事項 -->

  <div class="course-warning small">

    <div class="warning-title">
      ドコデモDG注意事項
    </div>

    <p>
      ※<span class="red">割引類は全て利用不可</span>
　　<br>
      ※<span class="red">出張コースのみ</span>
　　<br>
      ※店舗から<span class="red">2時間以上かかる遠方</span>が基本対象
　　<br>
      ※交通費等は<span class="red">全額お客様負担</span>
　　<br>
      ※支払いは<span class="red">事前決済(クレジットorイクペイ)のみ</span>
　　<br>
      ※クレジット支払いの場合は、<span class="red">手数料5%が加算されます</span>
    </p>

  </div>

</main>

<script>
fetch("../parts/header.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  });
</script>
  
</body>
</html>
