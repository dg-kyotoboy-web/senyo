<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BOY専用ページ</title>

  <link rel="stylesheet" href="../style.css">
</head>

<body>

<div id="header"></div>

<!-- =========================
     コース一覧
========================= -->

<main class="course-page">

  <h2 class="course-title">
  パックコース
  <br>
  <span class="course-subtitle">
    【個室のみ】
  </span>
</h2>

  <!-- 3時間パック -->

  <section class="course-row">

    <div class="course-name">
      3時間パック
    </div>

    <div class="price-box">
      <div class="price-label">
        個室
      </div>

      <div class="price">
        ￥28,000-
      </div>
    </div>

  </section>

  <!-- 4時間パック -->

  <section class="course-row">

    <div class="course-name">
      4時間パック
    </div>

    <div class="price-box">
      <div class="price-label">
        個室
      </div>

      <div class="price">
        ￥32,000-
      </div>
    </div>

  </section>

  <!-- 5時間パック -->

  <section class="course-row">

    <div class="course-name">
      5時間パック
    </div>

    <div class="price-box">
      <div class="price-label">
        個室
      </div>

      <div class="price">
        ￥36,000-
      </div>
    </div>

  <!-- パック注意事項 -->

  <div class="course-warning small">

    <div class="warning-title">
      パックコース注意事項
    </div>

    <p>
      ※<span class="red">13時～18時開始の予約までが対象</span>
    <br>
      ※割引類は、全て利用可能
    </p>

  </div>    

</main>

<script>
fetch("../parts/header.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  });
</script>

<script>
fetch("../parts/header.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;

    const menuToggle = document.getElementById("menuToggle");
    const globalMenu = document.getElementById("globalMenu");

    menuToggle.addEventListener("click", function(){
      globalMenu.classList.toggle("active");

      if(menuToggle.textContent === "☰"){
        menuToggle.textContent = "×";
        menuToggle.style.color = "#333";
      }else{
        menuToggle.textContent = "☰";
        menuToggle.style.color = "white";
      }
    });

    document.querySelectorAll(".dropdown .dropbtn").forEach(function(button){
      button.addEventListener("click", function(){
        this.parentElement.classList.toggle("open");
      });
    });

    document.querySelectorAll(".submenu > a").forEach(function(link){
      link.addEventListener("click", function(e){
        e.preventDefault();
        this.parentElement.classList.toggle("open");
      });
    });
  });
</script>
  
</body>
</html>
