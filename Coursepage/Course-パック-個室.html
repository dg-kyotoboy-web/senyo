<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BOY専用ページ</title>

  <link rel="stylesheet" href="../style.css">
</head>

<body>

<div id="header"></div>

<!-- =========================
     コース一覧
========================= -->

<main class="course-page">

  <h2 class="course-title">
  パックコース
  <br>
  <span class="course-subtitle">
    【個室のみ】
  </span>
</h2>

  <div class="course-note-box">

　　<p>
      ※<font color="red">18時開始の予約まで対象</font>
    </p>

    <p>
      ※割引類は、全て利用可能
    </p>

  </div>

  <!-- 3時間パック -->

  <section class="course-row">

    <div class="course-name">
      3時間パック
    </div>

    <div class="price-box">
      <div class="price-label">
        個室
      </div>

      <div class="price">
        ￥28,000-
      </div>
    </div>

  </section>

  <!-- 4時間パック -->

  <section class="course-row">

    <div class="course-name">
      4時間パック
    </div>

    <div class="price-box">
      <div class="price-label">
        個室
      </div>

      <div class="price">
        ￥32,000-
      </div>
    </div>

  </section>

  <!-- 5時間パック -->

  <section class="course-row">

    <div class="course-name">
      5時間パック
    </div>

    <div class="price-box">
      <div class="price-label">
        個室
      </div>

      <div class="price">
        ￥36,000-
      </div>
    </div>

</main>

<script>
fetch("../parts/header.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  });
</script>
  
</body>
</html>
