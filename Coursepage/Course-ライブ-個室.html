<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BOY専用ページ</title>

  <link rel="stylesheet" href="../style.css">
</head>

<body>

<div id="header"></div>

<!-- =========================
     コース一覧
========================= -->

<main class="course-page">

  <h2 class="course-title">
    2shotライブコース
  <br>
  <span class="course-subtitle">
    【店舗個室のみ】
  </span>
  </h2>

  <!-- 30分 -->

  <section class="course-row">

    <div class="course-name">
      ライブ30分
    </div>

    <div class="price-box">

      <div class="price-label">
        個室
      </div>

      <div class="price">
        ￥4,500-
      </div>

    </div>

  </section>

  <!-- 60分 -->

  <section class="course-row">

    <div class="course-name">
      ライブ60分
    </div>

    <div class="price-box">

      <div class="price-label">
        個室
      </div>

      <div class="price">
        ￥8,500-
      </div>

    </div>

  </section>

  <!-- ライコース注意事項 -->

  <div class="course-warning small">

    <div class="warning-title">
      ライブコース注意事項
    </div>

    <p>
      ※支払いは<span class="red">事前決済(クレジットorイクペイ)のみ</span>
　　<br>
      ※個室と記載されているが、<span class="red">お客様は自宅やホテルから視聴可能</span>
　　<br>
      ※<span class="red">割引類は全て利用不可</span>
　　<br>
      ※<span class="red">お客様は顔出しなしでもお楽しみ頂けます</span>
    </p>

  </div>

</main>

<script>
fetch("../parts/header.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  });
</script>
  
</body>
</html>
