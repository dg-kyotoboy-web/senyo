<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BOY専用ページ</title>

  <link rel="stylesheet" href="../style.css">
</head>

<body>

<div id="header"></div>

<!-- =========================
     コース一覧
========================= -->

<main class="course-page">

  <h2 class="course-title">
    各コース延長
  </h2>

  <!-- 30分 -->

  <section class="course-row">

    <div class="course-name">
      延長30分
    </div>

    <div class="price-box">

      <div class="price-label">
        個室
      </div>

      <div class="price">
        ￥6,000-
      </div>

    </div>

  </section>

  <!-- 60分 -->

  <section class="course-row">

    <div class="course-name">
      延長60分
    </div>

    <div class="price-box">

      <div class="price-label">
        個室
      </div>

      <div class="price">
        ￥7,000-
      </div>

    </div>

  </section>

  <!-- 延長注意事項 -->

  <div class="course-warning small">

    <div class="warning-title">
      延長の注意事項
    </div>

    <p>
      ※60分延長は<span class="red">LONGコースでのみ利用可能</span>
　　<br>
      ※その他のコースは<span class="red">30分延長のみ利用可能</span>
　　<br>
      ※<span class="red">貸切コースは延長不可</span>
    </p>

  </div>

</main>

<script>
fetch("../parts/header.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  });
</script>
  
</body>
</html>
