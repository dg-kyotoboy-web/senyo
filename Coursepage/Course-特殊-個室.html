<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BOY専用ページ</title>

  <link rel="stylesheet" href="../style.css">
</head>

<body>

<div id="header"></div>

<!-- =========================
     コース一覧
========================= -->

<main class="course-page">

  <h2 class="course-title">
    特殊コース
    <br>

    <span class="course-subtitle">
      【個室のみ】
    </span>
  </h2>

  <!-- W90 -->

  <section class="course-row">

    <div class="course-name">
      W90分
    </div>

    <div class="price-box">

      <div class="price-label">
        個室
      </div>

      <div class="price">
        ￥20,500-
      </div>

    </div>

  </section>

  <!-- W指名注意事項 -->

  <div class="course-warning small">

    <div class="warning-title">
      W90分コース注意事項
    </div>

    <p>
      ※割引類は、全て使用可能
    </p>

  </div>
  
  <!-- 3P / 60分 -->

  <section class="course-row">

    <div class="course-name">
      3P / 60分
    </div>

    <div class="price-box">

      <div class="price-label">
        個室
      </div>

      <div class="price">
        ￥28,000-
      </div>

    </div>

  </section>

  <!-- 3P注意事項 -->

  <div class="course-warning small">

    <div class="warning-title">
      3Pコース注意事項
    </div>

    <p>
      ※ボーイ同士の
      <span class="red">
        絡み（バックプレイ）は禁止
      </span>
    <br>
      ※ボーイ同士の
      <span class="red">
        キスは任意
      </span>
    <br>
      ※先輩・後輩に関係なく
      <span class="red">
        相手は君付けで呼ぶ
      </span>
      <br>
      ※割引類は、全て使用可能
    </p>

  </div>

  <!-- ソープ90分 -->

  <section class="course-row">

    <div class="course-name">
      ソープ90分
    </div>

    <div class="price-box">

      <div class="price-label">
        個室
      </div>

      <div class="price">
        ￥23,000-
      </div>

    </div>

  </section>

  <!-- ソープ120分 -->

  <section class="course-row">

    <div class="course-name">
      ソープ120分
    </div>

    <div class="price-box">

      <div class="price-label">
        個室
      </div>

      <div class="price">
        ￥26,000-
      </div>

    </div>

  </section>

  <!-- ソープ注意事項 -->

  <div class="course-warning small">

    <div class="warning-title">
      ソープコース注意事項
    </div>

    <p>
      ※ソープコースは、
      <span class="red">
        大阪店限定
      </span>
    <br>
      ※割引類は、全て使用可能
    </p>

  </div>

</main>

<script>
fetch("../parts/header.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  });
</script>
  
</body>
</html>
