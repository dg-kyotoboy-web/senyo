<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サンプルページ</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f7f7f7;
      color: #333;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .main {
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
      background: white;
      border-radius: 10px;
    }

    h1 {
      margin-top: 0;
    }

    .button {
      display: inline-block;
      background: #007bff;
      color: white;
      padding: 12px 20px;
      text-decoration: none;
      border-radius: 6px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
    }
  </style>
</head>

<body>

  <header>
    <h1>ホームページタイトル</h1>
  </header>

  <div class="main">
    <h2>見出し</h2>
    <p>ここに説明文を入れます。</p>

    <a href="#" class="button">お問い合わせ</a>
  </div>

  <footer>
    © 2026 サンプルサイト
  </footer>

</body>
</html>
