<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BOY専用ページ</title>

  <link rel="stylesheet" href="../style.css">
</head>

<body>

<div id="header"></div>

<main class="qr-page">

  <h2 class="qr-title">
    LONGコースQR
  </h2>

  <!-- SHORT -->
  <section class="qr-box">

    <div class="qr-info">
      <h3>出張)SHORT8時間</h3>
      <p>￥28,000-</p>
    </div>

    <div class="qr-image">
      <img src="../images/28,000.png">
    </div>

  </section>

  <!-- 区切り -->
  <hr>

  <!-- MIDDLE -->
  <section class="qr-box">

    <div class="qr-info">
      <h3>出張)MIDDLE10時間</h3>
      <p>￥29,000-</p>
    </div>

    <div class="qr-image">
      <img src="../images/29,000.png">
    </div>

  </section>

  <!-- 区切り -->
  <hr>

  <!-- LONG -->
  <section class="qr-box">

    <div class="qr-info">
      <h3>出張)LONG12時間</h3>
      <p>￥30,000-</p>
    </div>

    <div class="qr-image">
      <img src="../images/30,000.png">
    </div>

  </section>


</main>

<script>
fetch("../parts/header.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  });
</script>

<script>
fetch("../parts/header.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;

    const menuToggle = document.getElementById("menuToggle");
    const globalMenu = document.getElementById("globalMenu");

    menuToggle.addEventListener("click", function(){
      globalMenu.classList.toggle("active");

      if(menuToggle.textContent === "☰"){
        menuToggle.textContent = "×";
        menuToggle.style.color = "#333";
      }else{
        menuToggle.textContent = "☰";
        menuToggle.style.color = "white";
      }
    });

    document.querySelectorAll(".dropdown .dropbtn").forEach(function(button){
      button.addEventListener("click", function(){
        this.parentElement.classList.toggle("open");
      });
    });

    document.querySelectorAll(".submenu > a").forEach(function(link){
      link.addEventListener("click", function(e){
        e.preventDefault();
        this.parentElement.classList.toggle("open");
      });
    });
  });
</script>
  
</body>
</html>
