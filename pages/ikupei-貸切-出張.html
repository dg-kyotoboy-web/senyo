<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BOY専用ページ</title>

  <link rel="stylesheet" href="../style.css">
</head>

<body>

<div id="header"></div>

<main class="qr-page">

  <h2 class="qr-title">
    貸切コースQR
  </h2>

  <!-- 貸切19時間 -->
  <section class="qr-box">

    <div class="qr-info">
      <h3>S貸切(19時間)</h3>
      <p>￥64,000-</p>
    </div>

    <div class="qr-image">
      <img src="../images/64,000.png">
    </div>

  </section>

  <!-- 区切り -->
  <hr>

  <!-- 貸切24時間 -->
  <section class="qr-box">

    <div class="qr-info">
      <h3>貸切(貸切)</h3>
      <p>￥75,000-</p>
    </div>

    <div class="qr-image">
      <img src="../images/75,000.png">
    </div>

  </section>

  <!-- 区切り -->
  <hr>

  <!-- 貸切30時間 -->
  <section class="qr-box">

    <div class="qr-info">
      <h3>30貸切(30時間)</h3>
      <p>￥89,000-</p>
    </div>

    <div class="qr-image">
      <img src="../images/89,000.png">
    </div>

  </section>


</main>

<script>
fetch("../parts/header.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  });
</script>
  
</body>
</html>
